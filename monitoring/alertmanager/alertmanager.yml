global:
  resolve_timeout: 5m
  # Telegram bot settings — set via environment variables
  # TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in .env

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'telegram-alerts'

  routes:
    # Critical alerts go immediately
    - match:
        severity: critical
      receiver: 'telegram-critical'
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts are grouped
    - match:
        severity: warning
      receiver: 'telegram-alerts'
      group_wait: 1m
      repeat_interval: 4h

receivers:
  - name: 'telegram-alerts'
    webhook_configs:
      - url: 'http://telegram-bot:8080/alert'
        send_resolved: true
        http_config:
          follow_redirects: true

  - name: 'telegram-critical'
    webhook_configs:
      - url: 'http://telegram-bot:8080/alert'
        send_resolved: true
        http_config:
          follow_redirects: true

inhibit_rules:
  # If backend is down, suppress all backend-related warnings
  - source_match:
      severity: 'critical'
      service: 'backend'
    target_match:
      severity: 'warning'
      service: 'backend'
    equal: ['service']
