# ─────────────────────────────────────────────────────────────────────────────
# TechStore – Production-ready Docker Compose
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── SSL Certificate Generator (runs once) ──────────────────────────────────
  ssl-generator:
    image: alpine:latest
    container_name: techstore-ssl-gen
    volumes:
      - ./nginx/ssl:/ssl
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache openssl > /dev/null 2>&1
        if [ ! -f /ssl/cert.pem ] || [ ! -s /ssl/cert.pem ]; then
          echo 'Generating self-signed SSL certificate...'
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /ssl/key.pem -out /ssl/cert.pem -subj '/C=KZ/ST=Almaty/L=Almaty/O=TechStore/CN=localhost'
          echo 'SSL certificate generated.'
        else
          echo 'SSL certificate already exists.'
        fi
    restart: "no"

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  database:
    image: postgres:15-alpine
    container_name: techstore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: techstore
      POSTGRES_USER: techstore_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techstore_pass_2024}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - techstore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techstore_user -d techstore"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techstore-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://techstore_user:${POSTGRES_PASSWORD:-techstore_pass_2024}@database:5432/techstore
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - techstore-network
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techstore-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    networks:
      - techstore-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=https://localhost
    command: npm run dev -- --host
    logging: *default-logging

  # ── Nginx Reverse Proxy (SSL) ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: techstore-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      ssl-generator:
        condition: service_completed_successfully
    networks:
      - techstore-network
    logging: *default-logging

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: techstore-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - techstore-network
    logging: *default-logging

  # ── Alertmanager ───────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: techstore-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - techstore-network
    logging: *default-logging

  # ── Telegram Alert Bot ─────────────────────────────────────────────────────
  telegram-bot:
    build:
      context: ./monitoring/telegram-bot
      dockerfile: Dockerfile
    container_name: techstore-telegram-bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "8080:8080"
    networks:
      - techstore-network
    logging: *default-logging

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: techstore-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - techstore-network
    logging: *default-logging

  # ── Node Exporter (host metrics) ───────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: techstore-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - techstore-network
    logging: *default-logging

  # ── Jenkins CI/CD ──────────────────────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: techstore-jenkins
    restart: unless-stopped
    privileged: true
    user: root
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - techstore-network
    logging: *default-logging

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  jenkins-data:

networks:
  techstore-network:
    driver: bridge
